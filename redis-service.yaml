apiVersion: v1
kind: Service
metadata:
  name: redis                  # DNS name — pods reach Redis as "redis"
  namespace: url-shortener
spec:
  type: ClusterIP              # internal only
  selector:
    app: redis                 # routes to pods with this label
  ports:
  - name: redis
    port: 6379                 # port the Service listens on
    targetPort: 6379           # port on the Pod
    protocol: TCP
