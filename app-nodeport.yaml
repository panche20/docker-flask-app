apiVersion: v1
kind: Service
metadata:
  name: url-shortener-nodeport
  namespace: url-shortener
spec:
  type: NodePort
  selector:
    app: url-shortener
  ports:
  - name: http
    port: 80               # ClusterIP port
    targetPort: 8000       # Pod port
    nodePort: 30080        # External port (30000-32767)
    protocol: TCP
