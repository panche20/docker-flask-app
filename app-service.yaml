apiVersion: v1
kind: Service
metadata:
  name: url-shortener
  namespace: url-shortener
spec:
  type: ClusterIP
  selector:
    app: url-shortener
  ports:
  - name: http
    port: 80               # Service port (what clients use)
    targetPort: 8000       # Pod port (where app listens)
    protocol: TCP
